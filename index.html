<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>APL Motion Coach 3D</title>
<style>
:root{
  --bg:#09090f;--card:#111122;--card2:#181830;--border:rgba(255,255,255,.1);
  --txt:#e8e8f2;--txt2:rgba(255,255,255,.5);
  --blue:#3b82f6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --purple:#a855f7;--orange:#f97316;--cyan:#06b6d4;
  --sport:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,'Helvetica Neue',sans-serif;
     height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.h-logo{font-size:13px;font-weight:900;letter-spacing:.5px}
.h-logo .accent{color:var(--sport);transition:color .3s}
.h-ver{font-size:9px;opacity:.4;margin-left:5px}
.h-right{display:flex;gap:6px;align-items:center}
.h-btn{background:rgba(255,255,255,.08);color:var(--txt2);border:1px solid var(--border);
  border-radius:8px;padding:5px 10px;font-size:11px;cursor:pointer}
.h-btn:active{opacity:.7}

/* ── SPORT BAR ── */
#sport-bar{display:flex;gap:4px;padding:5px 10px;background:var(--card);
  border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#sport-bar::-webkit-scrollbar{display:none}
.sp-btn{background:rgba(255,255,255,.06);color:var(--txt2);border:1px solid var(--border);
  border-radius:8px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:all .2s}
.sp-btn.on{color:#fff;border-color:var(--sport-col)}
.sp-btn[data-s="SPL"].on{background:rgba(6,182,212,.25);border-color:#06b6d4;color:#06b6d4}
.sp-btn[data-s="GPL"].on{background:rgba(34,197,94,.25);border-color:#22c55e;color:#22c55e}
.sp-btn[data-s="BPL"].on{background:rgba(249,115,22,.25);border-color:#f97316;color:#f97316}
.sp-btn[data-s="TPL"].on{background:rgba(168,85,247,.25);border-color:#a855f7;color:#a855f7}
.sp-btn[data-s="GEN"].on{background:rgba(59,130,246,.25);border-color:#3b82f6;color:#3b82f6}

/* ── MAIN AREA ── */
#app-body{flex:1;display:flex;overflow:hidden;min-height:0}
#vid-wrap{flex:1;position:relative;background:#000;overflow:hidden;display:flex;
  align-items:center;justify-content:center}
#vid{position:absolute;width:100%;height:100%;object-fit:contain;opacity:0}
#vid.show{opacity:1}
#cvs{position:absolute;top:0;left:0;width:100%;height:100%}

/* ── OVERLAYS ── */
#load-overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:20}
#load-overlay.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid rgba(59,130,246,.3);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-txt{font-size:13px;color:var(--txt2);text-align:center;line-height:1.6}
.load-sub{font-size:10px;color:rgba(255,255,255,.3)}
#no-det{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:13px;color:var(--txt2);pointer-events:none;display:none;text-align:center}
#no-det.on{display:block}
#info-bar{position:absolute;top:8px;left:8px;display:flex;gap:5px;pointer-events:none;flex-wrap:wrap}
.chip{background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.15);
  border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700}
.chip.blue{border-color:var(--blue);color:var(--blue)}
.chip.red{border-color:var(--red);color:var(--red);animation:blink 1s ease-in-out infinite}
.chip.green{border-color:var(--green);color:var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── RIGHT PANEL ── */
#right-panel{width:136px;background:var(--card);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;scrollbar-width:none}
#right-panel::-webkit-scrollbar{display:none}
.rp-sec{padding:7px 8px;border-bottom:1px solid var(--border)}
.rp-title{font-size:8px;color:var(--txt2);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:5px;font-weight:700}
.rp-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.rp-lbl{font-size:10px;color:var(--txt2);flex-shrink:0}
.rp-val{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.rp-val.highlight{font-size:13px;animation:pulse-val .5s ease}
@keyframes pulse-val{0%{transform:scale(1.2)}100%{transform:scale(1)}}
.spd-bar{height:2px;background:rgba(255,255,255,.1);border-radius:1px;margin-top:1px;overflow:hidden}
.spd-fill{height:100%;border-radius:1px;transition:width .08s}
.pt-row{display:flex;align-items:center;gap:5px;margin-bottom:4px;cursor:pointer}
.pt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pt-lbl{font-size:10px;color:var(--txt2)}
.pt-row input{cursor:pointer;accent-color:var(--blue);width:12px;height:12px}
.rp-alert{font-size:9px;padding:4px 6px;border-radius:5px;margin-bottom:3px;line-height:1.4}
.rp-alert.ok{background:rgba(34,197,94,.15);color:#22c55e}
.rp-alert.warn{background:rgba(234,179,8,.15);color:#eab308}
.rp-alert.bad{background:rgba(239,68,68,.15);color:#ef4444}

/* ── GRAPH ── */
#graph-wrap{height:76px;background:var(--card2);border-top:1px solid var(--border);
  padding:4px 8px 3px;flex-shrink:0}
#graph-hdr{font-size:9px;color:var(--txt2);margin-bottom:2px;display:flex;
  align-items:center;justify-content:space-between}
#graph-legend{display:flex;gap:8px;overflow:hidden}
.g-leg{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--txt2);white-space:nowrap}
.g-dot{width:8px;height:2px;border-radius:1px;flex-shrink:0}
#graph-cvs{width:100%;display:block}

/* ── CTRL BAR ── */
#ctrl-bar{background:var(--card);border-top:1px solid var(--border);
  padding:6px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap}
.btn{border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;
  padding:7px 11px;transition:opacity .15s;white-space:nowrap}
.btn:active{opacity:.7}
.btn-src{background:rgba(255,255,255,.1);color:var(--txt)}
.btn-src.on{background:var(--blue);color:#fff}
.btn-ghost{background:rgba(255,255,255,.08);color:var(--txt2);font-size:11px}
.btn-ghost.on{background:rgba(34,197,94,.25);color:var(--green);border:1px solid var(--green)}
.btn-rec{background:rgba(239,68,68,.15);color:var(--red);font-size:11px;border:1px solid rgba(239,68,68,.3)}
.btn-rec.on{background:var(--red);color:#fff}
.btn-csv{background:rgba(255,255,255,.08);color:var(--txt2);font-size:11px}
.btn-main{background:var(--green);color:#fff;padding:9px 16px;font-size:13px;border-radius:12px}
.btn-main.stop{background:var(--red)}
.sep{flex:1}
#spd-wrap{display:flex;align-items:center;gap:5px}
#spd-lbl{font-size:10px;color:var(--txt2)}
#spd-sel{background:rgba(255,255,255,.1);color:var(--txt);border:1px solid var(--border);
  border-radius:6px;padding:4px 6px;font-size:11px;cursor:pointer}
#file-name{font-size:10px;color:var(--txt2);max-width:90px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}

@media(max-width:420px){
  #right-panel{width:112px}
  .btn{padding:6px 8px;font-size:10px}
  .btn-main{padding:8px 12px;font-size:12px}
}
</style>
</head>
<body>

<header>
  <div>
    <span class="h-logo">APL MOTION COACH <span class="accent" id="accent-txt">3D</span></span>
    <span class="h-ver">v2</span>
  </div>
  <div class="h-right">
    <button class="h-btn" id="btn-reset">↺ Max</button>
    <button class="h-btn" id="btn-lang">🌐 KO</button>
  </div>
</header>

<div id="sport-bar">
  <button class="sp-btn on" data-s="GEN">⚡ General</button>
  <button class="sp-btn" data-s="SPL">❄️ SPL 피겨</button>
  <button class="sp-btn" data-s="GPL">⛳ GPL 골프</button>
  <button class="sp-btn" data-s="BPL">⚾ BPL 야구</button>
  <button class="sp-btn" data-s="TPL">🎾 TPL 테니스</button>
</div>

<div id="app-body">
  <div id="vid-wrap">
    <video id="vid" autoplay muted playsinline></video>
    <canvas id="cvs"></canvas>
    <div id="load-overlay">
      <div class="spinner"></div>
      <div id="load-txt">MediaPipe 모델 로딩 중...</div>
      <div class="load-sub">처음 1-2분 소요될 수 있습니다</div>
    </div>
    <div id="no-det" class="on"></div>
    <div id="info-bar">
      <div class="chip" id="chip-fps">-- fps</div>
      <div class="chip blue">MediaPipe 3D</div>
      <div class="chip red" id="chip-rec" style="display:none">● REC</div>
      <div class="chip green" id="chip-ghost" style="display:none">👻 Base</div>
    </div>
  </div>

  <div id="right-panel">
    <!-- Sport Alert -->
    <div class="rp-sec" id="alert-sec" style="display:none">
      <div class="rp-title" id="rp-t-alert"></div>
      <div id="alert-wrap"></div>
    </div>
    <!-- Rotation 3D -->
    <div class="rp-sec">
      <div class="rp-title" id="rp-t-rot"></div>
      <div class="rp-row">
        <span class="rp-lbl" id="rp-sh"></span>
        <span class="rp-val" id="rv-sh" style="color:var(--purple)">--°</span>
      </div>
      <div class="rp-row">
        <span class="rp-lbl" id="rp-hip"></span>
        <span class="rp-val" id="rv-hip" style="color:var(--orange)">--°</span>
      </div>
      <div class="rp-row">
        <span class="rp-lbl">X-factor</span>
        <span class="rp-val" id="rv-xf" style="color:var(--green)">--°</span>
      </div>
    </div>
    <!-- Posture -->
    <div class="rp-sec">
      <div class="rp-title" id="rp-t-pos"></div>
      <div class="rp-row">
        <span class="rp-lbl" id="rp-spine"></span>
        <span class="rp-val" id="rv-spine">--°</span>
      </div>
      <div class="rp-row">
        <span class="rp-lbl" id="rp-lean"></span>
        <span class="rp-val" id="rv-lean">--°</span>
      </div>
    </div>
    <!-- Joint Angles (sport-specific) -->
    <div class="rp-sec" id="joint-sec">
      <div class="rp-title" id="rp-t-joint"></div>
      <div id="joint-wrap"></div>
    </div>
    <!-- Speed -->
    <div class="rp-sec">
      <div class="rp-title" id="rp-t-spd"></div>
      <div id="spd-rows"></div>
    </div>
    <!-- Peak -->
    <div class="rp-sec">
      <div class="rp-title" id="rp-t-max"></div>
      <div id="max-rows"></div>
    </div>
    <!-- Track Points -->
    <div class="rp-sec">
      <div class="rp-title" id="rp-t-pts"></div>
      <div id="pt-wrap"></div>
    </div>
  </div>
</div>

<div id="graph-wrap">
  <div id="graph-hdr">
    <span id="graph-lbl"></span>
    <div id="graph-legend"></div>
  </div>
  <canvas id="graph-cvs"></canvas>
</div>

<div id="ctrl-bar">
  <button class="btn btn-src on" id="btn-cam"></button>
  <button class="btn btn-src" id="btn-file"></button>
  <span id="file-name"></span>
  <input type="file" id="file-input" accept="video/*" style="display:none">
  <div id="spd-wrap">
    <span id="spd-lbl"></span>
    <select id="spd-sel">
      <option value="1">1×</option>
      <option value="0.5">0.5×</option>
      <option value="0.25">0.25×</option>
      <option value="0.125">1/8×</option>
    </select>
  </div>
  <div class="sep"></div>
  <button class="btn btn-ghost" id="btn-ghost"></button>
  <button class="btn btn-rec" id="btn-rec"></button>
  <button class="btn btn-csv" id="btn-csv"></button>
  <button class="btn btn-main" id="btn-main"></button>
</div>

<script type="module">
import{PoseLandmarker,FilesetResolver}from"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm";
const WASM="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm";
const MODEL="https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task";
const GRAPH_MS=5000,SMOOTH_MS=80,MAX_MS=6.0,ARR_PX=40;

/* ── LANDMARK INDICES ── */
const I={NOSE:0,L_SH:11,R_SH:12,L_EL:13,R_EL:14,L_WR:15,R_WR:16,
  L_HIP:23,R_HIP:24,L_KN:25,R_KN:26,L_AN:27,R_AN:28,L_HEEL:29,R_HEEL:30};

const BONES=[[11,12],[23,24],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],
  [23,25],[25,27],[24,26],[26,28],[27,29],[28,30],[0,11],[0,12]];

/* ── VELOCITY TRACK POINTS ── */
const TRACK=[
  {id:'wrist',  ko:'손목',   en:'Wrist',    idx:[15,16],col:'#3b82f6'},
  {id:'elbow',  ko:'팔꿈치', en:'Elbow',    idx:[13,14],col:'#06b6d4'},
  {id:'shoulder',ko:'어깨',  en:'Shoulder', idx:[11,12],col:'#a855f7'},
  {id:'hip',    ko:'골반',   en:'Hip',      idx:[23,24],col:'#f97316'},
  {id:'knee',   ko:'무릎',   en:'Knee',     idx:[25,26],col:'#22c55e'},
  {id:'ankle',  ko:'발목',   en:'Ankle',    idx:[27,28],col:'#ef4444'},
];

const KP_COL={15:'#3b82f6',16:'#3b82f6',13:'#06b6d4',14:'#06b6d4',
  11:'#a855f7',12:'#a855f7',23:'#f97316',24:'#f97316',
  25:'#22c55e',26:'#22c55e',27:'#ef4444',28:'#ef4444'};

/* ── SPORT MODES ── */
const SPORTS={
  GEN:{ko:'일반 분석',  en:'General',     col:'#3b82f6',
    joints:[],
    checks:[]},
  SPL:{ko:'피겨/스케이팅', en:'Skating',  col:'#06b6d4',
    joints:[
      {id:'lknee',ko:'왼 무릎',en:'L.Knee',  pts:[23,25,27],col:'#22c55e'},
      {id:'rknee',ko:'오른 무릎',en:'R.Knee',pts:[24,26,28],col:'#eab308'},
    ],
    checks:[
      {id:'knee',ko_ok:'무릎 굽힘 양호',ko_warn:'무릎 굽힘 부족',ko_bad:'무릎 과신전 주의',
       en_ok:'Knee bend OK',en_warn:'Bend more',en_bad:'Hyperextension risk',
       fn:(a)=>a.lknee<170?a.lknee<100?'bad':'ok':'warn'}
    ]},
  GPL:{ko:'골프',    en:'Golf',           col:'#22c55e',
    joints:[
      {id:'lknee',ko:'왼 무릎',en:'L.Knee',  pts:[23,25,27],col:'#22c55e'},
      {id:'lelbow',ko:'왼 팔꿈치',en:'L.Elbow',pts:[11,13,15],col:'#06b6d4'},
    ],
    checks:[
      {id:'xf',ko_ok:'X-factor 우수',ko_warn:'회전 개선 필요',ko_bad:'회전 부족',
       en_ok:'X-factor excellent',en_warn:'Improve rotation',en_bad:'Rotation too small',
       fn:(a)=>Math.abs(a.xf)>=25?'ok':Math.abs(a.xf)>=12?'warn':'bad'}
    ]},
  BPL:{ko:'야구/농구', en:'Baseball/Basketball', col:'#f97316',
    joints:[
      {id:'lknee',ko:'왼 무릎',en:'L.Knee',  pts:[23,25,27],col:'#22c55e'},
      {id:'rknee',ko:'오른 무릎',en:'R.Knee',pts:[24,26,28],col:'#eab308'},
      {id:'lelbow',ko:'왼 팔꿈치',en:'L.Elbow',pts:[11,13,15],col:'#06b6d4'},
      {id:'relbow',ko:'오른 팔꿈치',en:'R.Elbow',pts:[12,14,16],col:'#a855f7'},
    ],
    checks:[
      {id:'sh',ko_ok:'어깨 회전 양호',ko_warn:'어깨 회전 확인',ko_bad:'어깨 회전 부족',
       en_ok:'Shoulder rotation OK',en_warn:'Check rotation',en_bad:'Insufficient rotation',
       fn:(a)=>Math.abs(a.shR)>=30?'ok':Math.abs(a.shR)>=15?'warn':'bad'}
    ]},
  TPL:{ko:'테니스', en:'Tennis',           col:'#a855f7',
    joints:[
      {id:'lelbow',ko:'왼 팔꿈치',en:'L.Elbow',pts:[11,13,15],col:'#06b6d4'},
      {id:'relbow',ko:'오른 팔꿈치',en:'R.Elbow',pts:[12,14,16],col:'#a855f7'},
    ],
    checks:[
      {id:'xf',ko_ok:'X-factor 양호',ko_warn:'상체 회전 확인',ko_bad:'회전 부족',
       en_ok:'X-factor OK',en_warn:'Check torso rotation',en_bad:'Insufficient rotation',
       fn:(a)=>Math.abs(a.xf)>=20?'ok':Math.abs(a.xf)>=10?'warn':'bad'}
    ]},
};

/* ── STATE ── */
let det=null,live=false,src='camera',stream=null,raf=null,lang='ko';
let wH=[],vH={},peak={},cur={},lastAngles={};
let sel=new Set(['wrist','ankle','shoulder','hip']);
let fN=0,fT=0;
let sport='GEN';
// Ghost/baseline
let ghostLm=null,showGhost=false;
// Recording
let recorder=null,recChunks=[],isRec=false;
// CSV data log
let dataLog=[];

const $=id=>document.getElementById(id);
const vid=$('vid'),cvs=$('cvs'),ctx=cvs.getContext('2d');
const gC=$('graph-cvs'),gX=gC.getContext('2d');

/* ── INIT ── */
async function init(){
  buildPts();buildRows();buildJoints();events();lang_apply();resize();
  try{
    const v=await FilesetResolver.forVisionTasks(WASM);
    $('load-txt').textContent=lang==='ko'?'3D 포즈 모델 로딩 중...':'Loading 3D model...';
    det=await PoseLandmarker.createFromOptions(v,{
      baseOptions:{modelAssetPath:MODEL,delegate:'GPU'},
      runningMode:'VIDEO',numPoses:1,
      minPoseDetectionConfidence:.5,minPosePresenceConfidence:.5,minTrackingConfidence:.5,
      outputSegmentationMasks:false,
    });
    $('load-overlay').classList.add('hidden');
  }catch(e){$('load-txt').textContent='❌ 로드 실패: '+e.message;}
}

/* ── EVENTS ── */
function events(){
  $('btn-cam').onclick=()=>setMode('camera');
  $('btn-file').onclick=()=>$('file-input').click();
  $('file-input').onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    setMode('file',f);$('file-name').textContent=f.name;
  };
  $('btn-main').onclick=()=>live?stop_ana():start_ana();
  $('spd-sel').onchange=()=>{if(vid.src)vid.playbackRate=+$('spd-sel').value;};
  $('btn-lang').onclick=()=>{lang=lang==='ko'?'en':'ko';lang_apply();};
  $('btn-reset').onclick=()=>{peak={};buildRows();};
  $('btn-ghost').onclick=()=>{
    if(!live||!lastAngles.shR===undefined){alert(lang==='ko'?'분석 중에 사용하세요':'Start analysis first');return;}
    if(showGhost){showGhost=false;ghostLm=null;}
    else{ghostLm=wH.length?[...wH[wH.length-1].wlm]:null;showGhost=!!ghostLm;}
    updateGhostUI();lang_apply();
  };
  $('btn-rec').onclick=()=>isRec?stopRec():startRec();
  $('btn-csv').onclick=()=>exportCSV();
  document.querySelectorAll('.sp-btn').forEach(b=>b.onclick=()=>setSport(b.dataset.s));
  window.addEventListener('resize',resize);
  vid.addEventListener('ended',()=>{if(live&&src==='file')stop_ana();});
}

function setSport(s){
  sport=s;
  document.querySelectorAll('.sp-btn').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  const col=SPORTS[s].col;
  document.documentElement.style.setProperty('--sport',col);
  buildJoints();lang_apply();
}

function setMode(mode,file){
  src=mode;
  $('btn-cam').classList.toggle('on',mode==='camera');
  $('btn-file').classList.toggle('on',mode==='file');
  $('file-name').textContent='';
  if(mode==='file'&&file){
    const url=URL.createObjectURL(file);
    vid.srcObject=null;vid.src=url;vid.load();
  }
}

/* ── START / STOP ── */
async function start_ana(){
  if(!det){alert(lang==='ko'?'모델 로딩 중...':'Model not ready');return;}
  if(src==='camera'){
    try{
      stream=await navigator.mediaDevices.getUserMedia(
        {video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});
      vid.srcObject=stream;vid.removeAttribute('src');await vid.play();
    }catch(e1){
      try{stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
        vid.srcObject=stream;await vid.play();}
      catch(e2){alert('카메라 오류: '+e2.message);return;}
    }
  }else{
    vid.playbackRate=+$('spd-sel').value;vid.currentTime=0;
    await vid.play().catch(()=>{});
  }
  vid.classList.add('show');
  live=true;wH=[];vH={};cur={};lastAngles={};dataLog=[];fN=0;fT=performance.now();
  $('btn-main').textContent=lang==='ko'?'■ 분석 중지':'■ Stop';
  $('btn-main').className='btn btn-main stop';
  $('no-det').classList.remove('on');
  loop();
}

function stop_ana(){
  live=false;
  if(isRec)stopRec();
  if(raf){cancelAnimationFrame(raf);raf=null;}
  if(src==='camera'&&stream){stream.getTracks().forEach(t=>t.stop());stream=null;vid.srcObject=null;}
  else vid.pause();
  vid.classList.remove('show');
  $('btn-main').textContent=lang==='ko'?'▶ 분석 시작':'▶ Start Analysis';
  $('btn-main').className='btn btn-main';
  $('no-det').classList.add('on');
  ctx.clearRect(0,0,cvs.width,cvs.height);
}

/* ── MAIN LOOP ── */
function loop(){
  if(!live)return;
  const t=performance.now();
  if(vid.readyState>=2&&!vid.paused){
    try{const r=det.detectForVideo(vid,t);frame(r,t);}catch(e){console.warn(e);}
    fN++;
    if(t-fT>=1000){
      $('chip-fps').textContent=Math.round(fN*1000/(t-fT))+' fps';
      fN=0;fT=t;
    }
  }
  raf=requestAnimationFrame(loop);
}

/* ── FRAME PROCESSING ── */
function frame(res,t){
  resize();ctx.clearRect(0,0,cvs.width,cvs.height);
  if(!res.worldLandmarks||!res.worldLandmarks.length){
    $('no-det').classList.add('on');return;
  }
  $('no-det').classList.remove('on');
  const lm=res.landmarks[0],wlm=res.worldLandmarks[0];
  wH.push({wlm,t});
  const cut=t-GRAPH_MS-2000;
  while(wH.length>1&&wH[0].t<cut)wH.shift();
  if(showGhost&&ghostLm)draw_ghost(lm,ghostLm);
  draw_sk(lm,wlm);draw_arr(lm,wlm);
  const a=angles3d(wlm);vel(wlm,t);
  lastAngles=a;
  // log for CSV
  if(dataLog.length===0||t-dataLog[dataLog.length-1].t>100){
    dataLog.push({t:Math.round(t),
      sh:a.shR,hip:a.hipR,xf:a.xf,spine:a.sp,lean:a.fl,
      lknee:a.lknee,rknee:a.rknee,lelbow:a.lelbow,relbow:a.relbow,
      ...Object.fromEntries(TRACK.map(p=>[p.id+'_spd',+(cur[p.id]||0).toFixed(3)]))
    });
  }
  update_panel(a);draw_graph(t);
}

/* ── ANGLE CALCULATIONS ── */
function angle3pts(a,b,c){
  const v1={x:a.x-b.x,y:a.y-b.y,z:a.z-b.z};
  const v2={x:c.x-b.x,y:c.y-b.y,z:c.z-b.z};
  const dot=v1.x*v2.x+v1.y*v2.y+v1.z*v2.z;
  const m1=Math.hypot(v1.x,v1.y,v1.z),m2=Math.hypot(v2.x,v2.y,v2.z);
  return m1&&m2?Math.round(Math.acos(Math.min(1,Math.max(-1,dot/(m1*m2))))*180/Math.PI):0;
}

function angles3d(w){
  const R=180/Math.PI;
  const shR=Math.round(Math.atan2(w[12].z-w[11].z,w[12].x-w[11].x)*R);
  const hipR=Math.round(Math.atan2(w[24].z-w[23].z,w[24].x-w[23].x)*R);
  let xf=shR-hipR;if(xf>180)xf-=360;if(xf<-180)xf+=360;
  const sx=(w[11].x+w[12].x)/2-(w[23].x+w[24].x)/2;
  const sy=(w[11].y+w[12].y)/2-(w[23].y+w[24].y)/2;
  const sz=(w[11].z+w[12].z)/2-(w[23].z+w[24].z)/2;
  const sl=Math.hypot(sx,sy,sz);
  const sp=sl>0.05?Math.round(Math.acos(Math.min(1,Math.abs(sy)/sl))*R):0;
  const fl=sl>0.05?Math.round(Math.atan2(sz,Math.abs(sy))*R):0;
  // Joint angles
  const lknee=angle3pts(w[23],w[25],w[27]);
  const rknee=angle3pts(w[24],w[26],w[28]);
  const lelbow=angle3pts(w[11],w[13],w[15]);
  const relbow=angle3pts(w[12],w[14],w[16]);
  return{shR,hipR,xf:Math.round(xf),sp,fl,lknee,rknee,lelbow,relbow};
}

/* ── VELOCITY ── */
function vel(wlm,t){
  if(wH.length<2)return;
  const prev=wH[wH.length-2];
  const dt=(t-prev.t)/1000;
  if(dt<=0||dt>0.3)return;
  TRACK.forEach(p=>{
    if(!sel.has(p.id))return;
    let sum=0,cnt=0;
    p.idx.forEach(i=>{
      const c=wlm[i],q=prev.wlm[i];if(!c||!q)return;
      sum+=Math.hypot(c.x-q.x,c.y-q.y,c.z-q.z)/dt;cnt++;
    });
    if(!cnt)return;
    const v=sum/cnt;
    if(!vH[p.id])vH[p.id]=[];
    vH[p.id].push({v,t});
    const cut=t-GRAPH_MS-500;
    while(vH[p.id].length>1&&vH[p.id][0].t<cut)vH[p.id].shift();
    const rec=vH[p.id].filter(e=>e.t>=t-SMOOTH_MS);
    const sv=rec.length?rec.reduce((s,e)=>s+e.v,0)/rec.length:v;
    cur[p.id]=sv;
    if(!peak[p.id]||sv>peak[p.id])peak[p.id]=sv;
  });
}

/* ── DRAW SKELETON ── */
function draw_sk(lm,wlm,alpha=1){
  const W=cvs.width,H=cvs.height;
  const p=i=>({x:lm[i].x*W,y:lm[i].y*H,z:wlm[i].z,vi:lm[i].visibility||0});
  ctx.globalAlpha=alpha;
  BONES.forEach(([a,b])=>{
    const pa=p(a),pb=p(b);
    if(pa.vi<0.3||pb.vi<0.3)return;
    const d=Math.max(-0.4,Math.min(0.4,(pa.z+pb.z)/2));
    ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);
    ctx.strokeStyle=`rgba(100,160,255,${(0.5+d*0.3).toFixed(2)})`;
    ctx.lineWidth=2.5;ctx.stroke();
  });
  // spine midline
  const mshx=(lm[11].x+lm[12].x)/2*W,mshy=(lm[11].y+lm[12].y)/2*H;
  const mhx=(lm[23].x+lm[24].x)/2*W,mhy=(lm[23].y+lm[24].y)/2*H;
  ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(mhx,mhy);ctx.lineTo(mshx,mshy);
  ctx.strokeStyle='rgba(250,230,80,.55)';ctx.lineWidth=2;ctx.stroke();
  ctx.setLineDash([]);
  for(let i=0;i<lm.length;i++){
    const pp=p(i);if(pp.vi<0.35)continue;
    ctx.beginPath();ctx.arc(pp.x,pp.y,5,0,Math.PI*2);
    ctx.fillStyle=KP_COL[i]||'rgba(180,180,180,.6)';ctx.fill();
    if(Math.abs(pp.z)>0.06){
      ctx.beginPath();ctx.arc(pp.x,pp.y,8+Math.abs(pp.z)*12,0,Math.PI*2);
      ctx.strokeStyle=pp.z<0?'rgba(0,200,255,.35)':'rgba(255,120,0,.25)';
      ctx.lineWidth=1.5;ctx.stroke();
    }
  }
  ctx.globalAlpha=1;
}

/* ── GHOST OVERLAY ── */
function draw_ghost(curLm,ghostWlm){
  // Draw ghost using current 2D positions scaled to ghost world proportions
  const W=cvs.width,H=cvs.height;
  const p=i=>({x:curLm[i].x*W,y:curLm[i].y*H,z:ghostWlm[i].z,vi:curLm[i].visibility||0});
  ctx.globalAlpha=0.35;
  BONES.forEach(([a,b])=>{
    const pa=p(a),pb=p(b);
    if(pa.vi<0.3||pb.vi<0.3)return;
    ctx.beginPath();ctx.moveTo(pa.x,pa.y);ctx.lineTo(pb.x,pb.y);
    ctx.strokeStyle='rgba(0,255,180,.8)';ctx.lineWidth=3;ctx.stroke();
  });
  for(let i=0;i<33;i++){
    if(i>=curLm.length)break;
    const vi=curLm[i].visibility||0;if(vi<0.35)continue;
    ctx.beginPath();ctx.arc(curLm[i].x*W,curLm[i].y*H,6,0,Math.PI*2);
    ctx.fillStyle='rgba(0,255,180,.7)';ctx.fill();
  }
  ctx.globalAlpha=1;
}

/* ── VELOCITY ARROWS ── */
function draw_arr(lm,wlm){
  if(wH.length<2)return;
  const prev=wH[wH.length-2];
  const W=cvs.width,H=cvs.height;
  TRACK.forEach(p=>{
    if(!sel.has(p.id))return;
    const v=cur[p.id]||0;if(v<0.15)return;
    p.idx.forEach(i=>{
      const cx=lm[i].x*W,cy=lm[i].y*H;
      const pw=prev.wlm[i];if(!pw)return;
      const dx=(wlm[i].x-pw.x)*W*5,dy=(wlm[i].y-pw.y)*H*5;
      const dist=Math.hypot(dx,dy)||1;
      const sc=Math.min(v*ARR_PX,70);
      const ex=cx+(dx/dist)*sc,ey=cy+(dy/dist)*sc;
      const ang=Math.atan2(dy,dx);
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(ex,ey);
      ctx.strokeStyle=p.col+'cc';ctx.lineWidth=2.5;ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ex,ey);
      ctx.lineTo(ex-9*Math.cos(ang-.42),ey-9*Math.sin(ang-.42));
      ctx.lineTo(ex-9*Math.cos(ang+.42),ey-9*Math.sin(ang+.42));
      ctx.closePath();ctx.fillStyle=p.col+'cc';ctx.fill();
    });
  });
}

/* ── UPDATE PANEL ── */
function update_panel(a){
  const f=v=>(v>=0?'+':'')+v+'°';
  $('rv-sh').textContent=f(a.shR);
  $('rv-hip').textContent=f(a.hipR);
  $('rv-xf').textContent=f(a.xf);
  $('rv-xf').style.color=Math.abs(a.xf)>25?'var(--green)':Math.abs(a.xf)>10?'var(--yellow)':'var(--txt2)';
  $('rv-spine').textContent=a.sp+'°';
  $('rv-lean').textContent=f(a.fl);

  // Joint angles
  const sp=SPORTS[sport];
  sp.joints.forEach(j=>{
    const el=$('jv-'+j.id);
    if(el){
      const val=a[j.id];
      el.textContent=(val||0)+'°';
      el.style.color=j.col;
    }
  });

  // Sport alerts
  if(sp.checks.length){
    const aw=$('alert-wrap');aw.innerHTML='';
    sp.checks.forEach(c=>{
      const state=c.fn(a);
      const ko=lang==='ko';
      const txt=ko?(state==='ok'?c.ko_ok:state==='warn'?c.ko_warn:c.ko_bad)
                   :(state==='ok'?c.en_ok:state==='warn'?c.en_warn:c.en_bad);
      const d=document.createElement('div');
      d.className='rp-alert '+state;d.textContent=txt;
      aw.appendChild(d);
    });
  }

  // Speed rows
  TRACK.filter(p=>sel.has(p.id)).forEach(p=>{
    const v=cur[p.id]||0;
    const el=$('sv-'+p.id),fi=$('sf-'+p.id),mx=$('mv-'+p.id);
    if(el)el.textContent=v.toFixed(2)+' m/s';
    if(fi)fi.style.width=Math.min(100,v/MAX_MS*100)+'%';
    if(mx)mx.textContent=(peak[p.id]||0).toFixed(2)+' m/s';
  });
}

/* ── GRAPH ── */
function draw_graph(t){
  const W=gC.width=gC.offsetWidth,H=gC.height=gC.offsetHeight||56;
  gX.clearRect(0,0,W,H);
  gX.strokeStyle='rgba(255,255,255,.05)';gX.lineWidth=1;
  [.25,.5,.75].forEach(y=>{gX.beginPath();gX.moveTo(0,H*y);gX.lineTo(W,H*y);gX.stroke();});
  const st=t-GRAPH_MS;
  TRACK.filter(p=>sel.has(p.id)).forEach(p=>{
    const h=vH[p.id];if(!h||h.length<2)return;
    const vis=h.filter(e=>e.t>=st);if(vis.length<2)return;
    gX.beginPath();let first=true;
    vis.forEach(e=>{
      const x=((e.t-st)/GRAPH_MS)*W,y=H-Math.min(1,e.v/MAX_MS)*H;
      first?(gX.moveTo(x,y),first=false):gX.lineTo(x,y);
    });
    gX.strokeStyle=p.col+'bb';gX.lineWidth=1.8;gX.stroke();
  });
  gX.fillStyle='rgba(255,255,255,.25)';
  gX.font='9px -apple-system,sans-serif';gX.textAlign='right';
  gX.fillText(MAX_MS+'m/s',W-2,10);gX.fillText('0',W-2,H-2);
}

/* ── BUILD UI COMPONENTS ── */
function buildPts(){
  const w=$('pt-wrap');w.innerHTML='';
  TRACK.forEach(p=>{
    const lbl=document.createElement('label');lbl.className='pt-row';
    const cb=document.createElement('input');cb.type='checkbox';cb.checked=sel.has(p.id);
    cb.onchange=e=>{e.target.checked?sel.add(p.id):sel.delete(p.id);buildRows();};
    const dot=document.createElement('div');dot.className='pt-dot';dot.style.background=p.col;
    const sp2=document.createElement('span');sp2.className='pt-lbl';
    sp2.textContent=lang==='ko'?p.ko:p.en;
    lbl.append(cb,dot,sp2);w.appendChild(lbl);
  });
}

function buildJoints(){
  const sp=SPORTS[sport];
  const sec=$('joint-sec');
  if(!sp.joints.length){sec.style.display='none';return;}
  sec.style.display='';
  $('alert-sec').style.display=sp.checks.length?'':'none';
  const w=$('joint-wrap');w.innerHTML='';
  sp.joints.forEach(j=>{
    const row=document.createElement('div');row.className='rp-row';
    const lbl=lang==='ko'?j.ko:j.en;
    row.innerHTML=`<span class="rp-lbl">${lbl}</span><span class="rp-val" id="jv-${j.id}" style="color:${j.col}">--°</span>`;
    w.appendChild(row);
  });
}

function buildRows(){
  const sr=$('spd-rows'),mr=$('max-rows'),lg=$('graph-legend');
  sr.innerHTML='';mr.innerHTML='';lg.innerHTML='';
  TRACK.filter(p=>sel.has(p.id)).forEach(p=>{
    const lbl=lang==='ko'?p.ko:p.en;
    const row=document.createElement('div');row.className='rp-row';
    row.innerHTML=`<span class="rp-lbl">${lbl}</span><span class="rp-val" id="sv-${p.id}" style="color:${p.col}">--</span>`;
    const bar=document.createElement('div');bar.className='spd-bar';
    const fill=document.createElement('div');fill.className='spd-fill';
    fill.id='sf-'+p.id;fill.style.background=p.col;fill.style.width='0%';
    bar.appendChild(fill);row.appendChild(bar);sr.appendChild(row);
    const mr2=document.createElement('div');mr2.className='rp-row';
    mr2.innerHTML=`<span class="rp-lbl" style="color:${p.col}">${lbl}</span><span class="rp-val" id="mv-${p.id}" style="color:${p.col}">--</span>`;
    mr.appendChild(mr2);
    const gl=document.createElement('div');gl.className='g-leg';
    gl.innerHTML=`<div class="g-dot" style="background:${p.col}"></div>${lbl}`;
    lg.appendChild(gl);
  });
}

  $('btn-rec').textContent=isRec?(ko?'⏹ 녹화 중지':'⏹ Stop Rec'):(ko?'⏺ 녹화':'⏺ Record');
  $('btn-csv').textContent=ko?'📊 CSV':'📊 CSV';
  $('rp-t-rot').textContent=ko?'회전각 3D':'Rotation 3D';
  $('rp-sh').textContent=ko?'어깨 회전':'Shoulder';
  $('rp-hip').textContent=ko?'골반 회전':'Hip';
  $('rp-t-pos').textContent=ko?'자세 3D':'Posture 3D';
  $('rp-spine').textContent=ko?'척추 기울기':'Spine tilt';
  $('rp-lean').textContent=ko?'전방 기울기':'Fwd lean';
  $('rp-t-joint').textContent=ko?'관절 각도':'Joint Angles';
  $('rp-t-spd').textContent=ko?'현재 속도':'Speed';

  $('rp-t-pts').textContent=ko?'추적 포인트':'Track Points';
  $('rp-t-alert').textContent=ko?'분석 피드백':'Feedback';
  $('no-det').textContent=ko?'📷 전신이 카메라에 보이도록 서 주세요':'📷 Stand so your full body is visible';
  $('graph-lbl').textContent=ko?'속도 그래프 (최근 5초)':'Speed Graph (last 5s)';
  // sport bar labels

    const sd=SPORTS[b.dataset.s];

      const icons={'GEN':'⚡','SPL':'❄️','GPL':'⛳','BPL':'⚾','TPL':'🎾'};
      b.textContent=icons[b.dataset.s]+' '+(ko?sd.ko:sd.en);

  buildPts();buildRows();buildJoints();

function updateGhostUI(){
  $('chip-ghost').style.display=showGhost?'':'none';
  $('btn-ghost').className='btn btn-ghost'+(showGhost?' on':'');
}

/* ── RECORDING ── */
function startRec(){
  if(!live){alert(lang==='ko'?'분석을 먼저 시작하세요':'Start analysis first');return;}
  try{
    const cs=cvs.captureStream(30);
    recorder=new MediaRecorder(cs,{mimeType:'video/webm;codecs=vp9'});
    recChunks=[];
    recorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
    recorder.onstop=()=>{
      const blob=new Blob(recChunks,{type:'video/webm'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='APL_motion_'+Date.now()+'.webm';a.click();
      URL.revokeObjectURL(url);
    };
    recorder.start(100);
    isRec=true;
    $('chip-rec').style.display='';
    lang_apply();
    $('btn-rec').className='btn btn-rec on';
  }catch(e){alert('녹화 오류: '+e.message);}
}

function stopRec(){
  if(recorder&&recorder.state!=='inactive')recorder.stop();
  isRec=false;
  $('chip-rec').style.display='none';
  lang_apply();
  $('btn-rec').className='btn btn-rec';
}

/* ── CSV EXPORT ── */
function exportCSV(){
  if(!dataLog.length){alert(lang==='ko'?'데이터 없음. 분석 후 내보내세요.':'No data. Run analysis first.');return;}
  const cols=['t','sh','hip','xf','spine','lean','lknee','rknee','lelbow','relbow',
    'wrist_spd','elbow_spd','shoulder_spd','hip_spd','knee_spd','ankle_spd'];
  const header=cols.join(',');
  const rows=dataLog.map(d=>cols.map(k=>d[k]??'').join(','));
  const csv=[header,...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='APL_data_'+Date.now()+'.csv';a.click();
  URL.revokeObjectURL(url);
}

/* ── RESIZE ── */
function resize(){
  const w=$('vid-wrap');
  cvs.width=w.offsetWidth;cvs.height=w.offsetHeight;
}

init();
